name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Verify server loads
        env:
          JWT_SECRET: test
          FIREBASE_API_KEY: test
          FIREBASE_PROJECT_ID: test
          FIREBASE_AUTH_DOMAIN: test
          FIREBASE_STORAGE_BUCKET: test
          FIREBASE_MESSAGING_SENDER_ID: test
          FIREBASE_APP_ID: test
        run: if timeout 5 node src/index.js; then exit 0; else code=$?; [ $code -eq 124 ] && exit 0; exit $code; fi

  lint-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

  build-client:
    runs-on: ubuntu-latest
    needs: lint-client
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: ./client/dist